name: bipenc
description: "BiPenc - Sistema Experto de Inventario y POS. Desarrollado por Jhonatan (Ing. de Sistemas)."
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado y Rutas
  provider: ^6.1.2
  go_router: ^14.6.2

  # Cámara
  camera: ^0.11.0+2
  path_provider: ^2.1.4

  # Imagen — recorte local de fondo
  image: 4.2.0
  flutter_image_compress: ^2.3.0

  # Impresión Térmica (Plus Edition for compatibility)
  print_bluetooth_thermal: ^1.1.7
  esc_pos_utils_plus: 2.0.3
  pdf: ^3.11.1

  # Backend / Persistencia
  supabase_flutter: ^2.9.0
  sqflite_sqlcipher: 3.4.0
  connectivity_plus: 6.1.3
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1
  logger: ^2.4.0
  crypto: ^3.0.6

  # Red
  http: ^1.2.2

  # Autenticación Biométrica
  local_auth: 2.3.0
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/logo/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
